<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqbobek Lyceum - Kiosk Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-text {
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .scroll-container {
            height: calc(100vh - 200px);
            overflow: hidden;
            position: relative;
        }
        .scroll-content {
            animation: scroll-up 40s linear infinite;
        }
        @keyframes scroll-up {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
        .hero-card {
            transition: transform 0.5s ease;
        }
        .hero-card.active {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="p-8">
    <div class="grid grid-cols-12 gap-8 h-full">
        <!-- Left Column: News & Events -->
        <div class="col-span-8 flex flex-col gap-8">
            <div class="flex items-center justify-between">
                <h1 class="text-7xl font-black tracking-tighter uppercase italic">Aqbobek <span class="gradient-text">Lyceum</span></h1>
                <div class="text-right">
                    <div id="clock" class="text-6xl font-black tabular-nums">00:00</div>
                    <div id="date" class="text-xl text-slate-400 font-medium">20 Марта, 2024</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-8 flex-1 min-h-0">
                <!-- News Feed -->
                <div class="flex flex-col">
                    <h2 class="text-2xl font-bold mb-4 text-blue-400 uppercase tracking-widest">Новости</h2>
                    <div class="scroll-container glass rounded-[2rem] p-8">
                        <div id="news-content" class="scroll-content space-y-8">
                            <!-- News items -->
                        </div>
                    </div>
                </div>

                <!-- Events & Birthdays -->
                <div class="flex flex-col gap-8">
                    <div class="flex-1 flex flex-col">
                        <h2 class="text-2xl font-bold mb-4 text-emerald-400 uppercase tracking-widest">События</h2>
                        <div id="events-content" class="glass rounded-[2rem] p-8 space-y-6 flex-1">
                            <!-- Events -->
                        </div>
                    </div>
                    <div class="h-1/3 flex flex-col">
                        <h2 class="text-2xl font-bold mb-4 text-purple-400 uppercase tracking-widest">Дни Рождения</h2>
                        <div id="birthdays-content" class="glass rounded-[2rem] p-8 flex items-center gap-6 overflow-hidden">
                            <!-- Birthdays -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Heroes & Top Students -->
        <div class="col-span-4 flex flex-col gap-8">
            <div class="flex-1 flex flex-col">
                <h2 class="text-2xl font-bold mb-4 text-amber-400 uppercase tracking-widest">Герои Недели</h2>
                <div id="heroes-content" class="glass rounded-[2rem] p-8 flex-1 flex flex-col justify-center gap-8">
                    <!-- Heroes -->
                </div>
            </div>

            <div class="h-1/2 flex flex-col">
                <h2 class="text-2xl font-bold mb-4 text-rose-400 uppercase tracking-widest">Топ Успеваемости</h2>
                <div id="top-students" class="glass rounded-[2rem] p-8 space-y-4 flex-1">
                    <!-- Top Students -->
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const [news, students, extra] = await Promise.all([
                    fetch('/api/news').then(r => r.json()),
                    fetch('/api/top-students').then(r => r.json()),
                    fetch('/api/kiosk/extra').then(r => r.json())
                ]);

                renderNews(news);
                renderStudents(students);
                renderExtra(extra);
            } catch (err) {
                console.error(err);
            }
        }

        function renderNews(news) {
            const container = document.getElementById('news-content');
            const items = [...news, ...news].map(item => `
                <div class="border-l-4 border-blue-500 pl-6 py-2">
                    <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">${item.category}</span>
                    <h3 class="text-2xl font-bold mt-1">${item.title}</h3>
                    <p class="text-slate-400 mt-2 line-clamp-2">${item.content}</p>
                </div>
            `).join('');
            container.innerHTML = items;
        }

        function renderStudents(students) {
            const container = document.getElementById('top-students');
            const items = students.slice(0, 5).map((s, i) => `
                <div class="flex items-center justify-between p-3 rounded-xl bg-white/5">
                    <div class="flex items-center gap-4">
                        <span class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center font-bold text-rose-400">${i + 1}</span>
                        <span class="font-bold">${s.name} ${s.surname}</span>
                    </div>
                    <span class="font-black text-rose-400">${s.score}</span>
                </div>
            `).join('');
            container.innerHTML = items;
        }

        function renderExtra(data) {
            // Render Events
            document.getElementById('events-content').innerHTML = data.events.map(e => `
                <div class="flex items-center gap-6">
                    <div class="text-center min-w-[80px]">
                        <div class="text-3xl font-black text-emerald-400">${e.date.split(' ')[0]}</div>
                        <div class="text-xs uppercase font-bold text-slate-500">${e.date.split(' ')[1]}</div>
                    </div>
                    <div>
                        <h4 class="text-xl font-bold">${e.title}</h4>
                        <p class="text-slate-500 font-medium">${e.time}</p>
                    </div>
                </div>
            `).join('');

            // Render Birthdays
            document.getElementById('birthdays-content').innerHTML = data.birthdays.map(b => `
                <div class="flex items-center gap-4 shrink-0">
                    <div class="w-12 h-12 rounded-full bg-purple-500/20 flex items-center justify-center text-purple-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div>
                        <div class="font-bold text-sm">${b.name} ${b.surname}</div>
                        <div class="text-[10px] text-slate-500">${b.class} • ${b.date}</div>
                    </div>
                </div>
            `).join('');

            // Render Heroes
            document.getElementById('heroes-content').innerHTML = data.heroes.map(h => `
                <div class="flex items-center gap-6 group">
                    <img src="${h.image}" class="w-24 h-24 rounded-3xl object-cover ring-4 ring-amber-500/30" referrerPolicy="no-referrer">
                    <div>
                        <h4 class="text-2xl font-black">${h.name} ${h.surname}</h4>
                        <p class="text-amber-400 font-bold uppercase text-xs tracking-widest mt-1">${h.achievement}</p>
                    </div>
                </div>
            `).join('');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        fetchData();
        updateClock();
        setInterval(updateClock, 1000);
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
